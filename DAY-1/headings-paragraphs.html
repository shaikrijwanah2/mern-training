<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Headings and Paragraphs</title>
</head>
<body>

  <h1>Heading 1</h1>
  <h2>Heading 2</h2>
  <h3>Heading 3</h3>
  <h4>Heading 4</h4>
  <h5>Heading 5</h5>
  <h6>Heading 6</h6>

  <p>This is a paragraph.</p>
  <p>This is another paragraph.</p>

  <p>This line has a <br> line break in the middle.</p>

  <hr>

  <p>This is <strong>bold text</strong>.</p>
  <p>This is <em>italic text</em>.</p>
  <p>This is <mark>highlighted text</mark>.</p>
  <p>This is <u>underlined text</u>.</p>
  <p>This is <s>strikethrough text</s>.</p>
  <p>H<sub>2</sub>O</p>
  <p>E = mc<sup>2</sup></p>

</body>
</html>
