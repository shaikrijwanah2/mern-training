<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Registration Form</title>
</head>
<body>

  <h2>Student Registration Form</h2>

  <form action="/submit" method="POST">

    <label for="firstName">First Name:</label>
    <input type="text" id="firstName" name="first_name" required>
    <br>

    <label for="lastName">Last Name:</label>
    <input type="text" id="lastName" name="last_name" required>
    <br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>
    <br>

    <label for="phone">Phone:</label>
    <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required>
    <br>

    <label for="dob">Date of Birth:</label>
    <input type="date" id="dob" name="dob" required>
    <br>

    <label>Gender:</label>
    <input type="radio" id="male" name="gender" value="male">
    <label for="male">Male</label>
    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Female</label>
    <br>

    <label for="department">Department:</label>
    <select id="department" name="department" required>
      <option value="">Select Department</option>
      <option value="cse">Computer Science</option>
      <option value="ece">Electronics</option>
      <option value="mech">Mechanical</option>
      <option value="civil">Civil</option>
    </select>
    <br>

    <label for="year">Year:</label>
    <select id="year" name="year" required>
      <option value="">Select Year</option>
      <option value="1">1st Year</option>
      <option value="2">2nd Year</option>
      <option value="3">3rd Year</option>
      <option value="4">4th Year</option>
    </select>
    <br>

    <label for="address">Address:</label>
    <textarea id="address" name="address" rows="3" cols="30"></textarea>
    <br>

    <label>Interests:</label>
    <input type="checkbox" id="webdev" name="interests" value="webdev">
    <label for="webdev">Web Dev</label>
    <input type="checkbox" id="ai" name="interests" value="ai">
    <label for="ai">AI</label>
    <input type="checkbox" id="db" name="interests" value="db">
    <label for="db">Databases</label>
    <br>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" minlength="8" required>
    <br>

    <input type="checkbox" id="terms" name="terms" required>
    <label for="terms">I agree to the Terms and Conditions</label>
    <br>

    <button type="submit">Register</button>
    <button type="reset">Clear</button>

  </form>

</body>
</html>
