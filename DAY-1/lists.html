<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lists</title>
</head>
<body>

  <!-- Unordered List -->
  <ul>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
  </ul>

  <!-- Ordered List -->
  <ol>
    <li>Wake up</li>
    <li>Brush teeth</li>
    <li>Eat breakfast</li>
  </ol>

  <!-- Nested List -->
  <ul>
    <li>Frontend
      <ul>
        <li>HTML</li>
        <li>CSS</li>
      </ul>
    </li>
    <li>Backend
      <ul>
        <li>Node.js</li>
        <li>Python</li>
      </ul>
    </li>
  </ul>

  <!-- Description List -->
  <dl>
    <dt>HTML</dt>
    <dd>Structure of the web page</dd>

    <dt>CSS</dt>
    <dd>Styling of the web page</dd>
  </dl>

</body>
</html>
