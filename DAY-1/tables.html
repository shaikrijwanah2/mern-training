<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tables</title>
</head>
<body>

  <!-- Basic table -->
  <table border="1">
    <tr>
      <th>Name</th>
      <th>Age</th>
      <th>City</th>
    </tr>
    <tr>
      <td>Alice</td>
      <td>22</td>
      <td>Mumbai</td>
    </tr>
    <tr>
      <td>Bob</td>
      <td>25</td>
      <td>Delhi</td>
    </tr>
  </table>

  <!-- Table with thead, tbody, tfoot -->
  <table border="1">
    <thead>
      <tr>
        <th>Item</th>
        <th>Price</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Apple</td>
        <td>₹20</td>
      </tr>
      <tr>
        <td>Mango</td>
        <td>₹50</td>
      </tr>
    </tbody>
    <tfoot>
      <tr>
        <td>Total</td>
        <td>₹70</td>
      </tr>
    </tfoot>
  </table>

  <!-- colspan and rowspan -->
  <table border="1">
    <tr>
      <td colspan="2">Spans 2 columns</td>
    </tr>
    <tr>
      <td rowspan="2">Spans 2 rows</td>
      <td>Row 1</td>
    </tr>
    <tr>
      <td>Row 2</td>
    </tr>
  </table>

</body>
</html>
