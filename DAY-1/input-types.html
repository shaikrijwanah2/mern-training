<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Input Types</title>
</head>
<body>

  <input type="text"           placeholder="text">          <br>
  <input type="email"          placeholder="email">         <br>
  <input type="password"       placeholder="password">      <br>
  <input type="number"         placeholder="number">        <br>
  <input type="tel"            placeholder="phone number">  <br>
  <input type="url"            placeholder="website URL">   <br>
  <input type="search"         placeholder="search">        <br>
  <input type="date">                                        <br>
  <input type="time">                                        <br>
  <input type="datetime-local">                              <br>
  <input type="month">                                       <br>
  <input type="week">                                        <br>
  <input type="range"  min="0" max="100">                    <br>
  <input type="color">                                       <br>
  <input type="checkbox"> Checkbox                           <br>
  <input type="radio"    name="r"> Radio                     <br>
  <input type="file">                                        <br>
  <input type="hidden"   value="hiddenValue">                <br>
  <input type="submit"   value="Submit">                     <br>
  <input type="reset"    value="Reset">                      <br>
  <input type="button"   value="Button">                     <br>

</body>
</html>
