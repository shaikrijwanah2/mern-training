<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Images</title>
</head>
<body>

  <!-- Basic image -->
  <img src="photo.jpg" alt="A photo">

  <!-- Image with width and height -->
  <img src="photo.jpg" alt="A photo" width="300" height="200">

  <!-- Image from a URL -->
  <img src="https://picsum.photos/300/200" alt="Random image">

  <!-- Image from subfolder -->
  <img src="images/banner.jpg" alt="Banner">

  <!-- Lazy loading image -->
  <img src="photo.jpg" alt="A photo" loading="lazy">

  <!-- Image with a caption -->
  <figure>
    <img src="photo.jpg" alt="Mountain">
    <figcaption>A mountain in the Himalayas</figcaption>
  </figure>

</body>
</html>
