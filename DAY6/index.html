<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input class="input" type="text" placeholder="Enter city name" spellcheck="false">
            <button><img src="search.png" ></button>
        </div>
        <div class="weather">
            
        </div>
        <div class="temp">
            <img src="clear.png" alt="sun">
            <h1 class="temperature">22°C</h1>
            <h2 class="city">Bengaluru</h2>
        </div>
        <div class="wind">
            <div class="humidity">
                <img src="humidity.png" alt="humidity">
                <div class="humidityVals">
                    <h1 class="humidityValue">53%</h1>
                    <span>Humidity</span>
                </div>
            </div>
            <div class="speed">
                <img src="wind.png" alt="wind">
                <div class="speedVals">
                    <h1 class="speedValue">5.66 km/h </h1>
                    <span>Wind Speed</span>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
