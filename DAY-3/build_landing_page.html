<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Landing Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }
        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #333;
            color: white;
            padding: 1rem 2rem;
        }
        .nav-links {
            display: flex;
            list-style: none;
        }
        .nav-links li {
            margin-left: 1.5rem;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
        }
        /* Cards section */
        .cards-section {
            padding: 2rem;
            text-align: center;
        }
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 2rem auto;
        }
        .card {
            background-color: #f4f4f4;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        /* Footer */
        .footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1rem;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">MySite</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <section class="cards-section">
        <h1>Welcome to Our Landing Page</h1>
        <div class="cards-container">
            <div class="card">
                <h3>Card 1</h3>
                <p>Some basic content for card one.</p>
            </div>
            <div class="card">
                <h3>Card 2</h3>
                <p>Some basic content for card two.</p>
            </div>
            <div class="card">
                <h3>Card 3</h3>
                <p>Some basic content for card three.</p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2025 MySite. All rights reserved.</p>
    </footer>
</body>
</html>
