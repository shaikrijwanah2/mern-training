<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch Users - Mini Project</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .user-card {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            background-color: #f9f9f9;
        }
        .user-card h3 { margin: 0 0 10px; color: #333; }
        .user-card p { margin: 5px 0; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #loading { color: #007bff; }
    </style>
</head>
<body>
    <h1>User List from JSONPlaceholder API</h1>
    <button id="loadUsers">Load Users</button>
    <div id="loading" style="display:none;">Loading...</div>
    <div id="usersContainer"></div>

    <script>
        document.getElementById('loadUsers').addEventListener('click', fetchUsers);

        async function fetchUsers() {
            const container = document.getElementById('usersContainer');
            const loading = document.getElementById('loading');

            // Show loading, clear previous content
            loading.style.display = 'block';
            container.innerHTML = '';

            try {
                // Fetch from public API
                const response = await fetch('https://jsonplaceholder.typicode.com/users');

                // Check if response is OK
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // Parse JSON
                const users = await response.json();

                // Display users (using destructuring and loops)
                users.forEach(user => {
                    // Destructuring to extract properties
                    const { name, email, phone, website, address } = user;
                    const { city, street } = address;

                    // Create card
                    const card = document.createElement('div');
                    card.className = 'user-card';
                    card.innerHTML = `
                        <h3>${name}</h3>
                        <p><strong>Email:</strong> ${email}</p>
                        <p><strong>Phone:</strong> ${phone}</p>
                        <p><strong>Website:</strong> ${website}</p>
                        <p><strong>Address:</strong> ${street}, ${city}</p>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
            } finally {
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
