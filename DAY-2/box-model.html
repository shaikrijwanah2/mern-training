<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Box Model</title>
  <link rel="stylesheet" href="box-model.css">
</head>
<body>

  <h2>Box Model</h2>

  <!-- content > padding > border > margin -->

  <div class="box">
    This is the content area
  </div>

  <div class="box-full">
    Content + Padding + Border + Margin
  </div>

  <div class="box-border-box">
    border-box sizing (padding and border included in width)
  </div>

  <div class="box-content-box">
    content-box sizing (default — padding and border ADD to width)
  </div>

</body>
</html>
