<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Selectors</title>
  <link rel="stylesheet" href="selectors.css">
</head>
<body>

  <h1>Selectors</h1>

  <p>Element selector</p>

  <p class="box">Class selector</p>
  <p class="box">Another class selector</p>

  <p id="unique">ID selector</p>

  <div class="parent">
    <p>Descendant of div</p>
    <span>Child span</span>
  </div>

  <a href="#">Hover over this link</a>

  <input type="text" placeholder="Focus on me">

  <p class="box special">Multiple classes</p>

  <ul>
    <li>First item</li>
    <li>Second item</li>
    <li>Third item</li>
    <li>Last item</li>
  </ul>

  <p>Attribute selector: <a href="https://google.com">External link</a></p>

</body>
</html>
