<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Registration Form - Styled</title>
  <link rel="stylesheet" href="styled-form.css">
</head>
<body>

  <div class="form-wrapper">
    <h2>Student Registration</h2>

    <form action="/submit" method="POST">

      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="first_name" placeholder="First name" required>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="last_name" placeholder="Last name" required>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="10-digit number" pattern="[0-9]{10}" required>
      </div>

      <div class="form-group">
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob" required>
      </div>

      <div class="form-group">
        <label>Gender</label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="male"> Male</label>
          <label><input type="radio" name="gender" value="female"> Female</label>
          <label><input type="radio" name="gender" value="other"> Other</label>
        </div>
      </div>

      <div class="form-group">
        <label for="department">Department</label>
        <select id="department" name="department" required>
          <option value="">Select Department</option>
          <option value="cse">Computer Science</option>
          <option value="ece">Electronics</option>
          <option value="mech">Mechanical</option>
          <option value="civil">Civil</option>
        </select>
      </div>

      <div class="form-group">
        <label for="year">Year</label>
        <select id="year" name="year" required>
          <option value="">Select Year</option>
          <option value="1">1st Year</option>
          <option value="2">2nd Year</option>
          <option value="3">3rd Year</option>
          <option value="4">4th Year</option>
        </select>
      </div>

      <div class="form-group">
        <label for="address">Address</label>
        <textarea id="address" name="address" rows="3" placeholder="Your full address"></textarea>
      </div>

      <div class="form-group">
        <label>Interests</label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="interests" value="webdev"> Web Dev</label>
          <label><input type="checkbox" name="interests" value="ai"> AI</label>
          <label><input type="checkbox" name="interests" value="db"> Databases</label>
          <label><input type="checkbox" name="interests" value="os"> OS</label>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min 8 characters" minlength="8" required>
      </div>

      <div class="form-group checkbox-terms">
        <label><input type="checkbox" name="terms" required> I agree to the Terms and Conditions</label>
      </div>

      <div class="btn-group">
        <button type="submit">Register</button>
        <button type="reset" class="btn-reset">Clear</button>
      </div>

    </form>
  </div>

</body>
</html>
